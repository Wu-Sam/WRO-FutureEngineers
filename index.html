<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2024 未來工程師 抽籤系統 (修正版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #0056b3; }
        .controls {
            margin: 10px 0;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }
        select, button {
            font-size: 16px;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        select { background-color: #e9ecef; border: 1px solid #ced4da; }
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; }
        button.draw-btn:hover { background-color: #218838; }
        button.reset-btn { background-color: #dc3545; color: white; font-weight: bold; }
        button.reset-btn:hover { background-color: #c82333; }
        
        .info-panel {
            margin: 10px auto;
            max-width: 650px;
            background: #eef2f5;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 15px;
        }

        /* 場地總容器 */
        .field-container {
            position: relative;
            width: 600px;
            height: 600px;
            margin: 20px auto;
            background-color: #fff;
            border: 4px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        
        /* 內部牆體提示區 */
        .inner-wall {
            position: absolute;
            top: 130px; left: 130px;
            width: 340px; height: 340px;
            background-color: #f8f9fa;
            border: 3px dashed #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #555;
            text-align: center;
            line-height: 1.5;
        }

        /* 賽段區域設定 - 修正為 1x6 的真實直線比例 */
        .segment {
            position: absolute;
            display: grid;
            gap: 2px;
            background-color: #ccc;
            border: 1px solid #999;
        }
        /* 上方直線：水平排列 6 格 */
        .segment.top { top: 20px; left: 100px; width: 400px; height: 80px; grid-template-columns: repeat(6, 1fr); grid-template-rows: 1fr; }
        /* 下方直線：水平排列 6 格 */
        .segment.bottom { bottom: 20px; left: 100px; width: 400px; height: 80px; grid-template-columns: repeat(6, 1fr); grid-template-rows: 1fr; }
        /* 左側直線：垂直排列 6 格 */
        .segment.left { top: 100px; left: 20px; width: 80px; height: 400px; grid-template-columns: 1fr; grid-template-rows: repeat(6, 1fr); }
        /* 右側直線：垂直排列 6 格 */
        .segment.right { top: 100px; right: 20px; width: 80px; height: 400px; grid-template-columns: 1fr; grid-template-rows: repeat(6, 1fr); }
        
        /* 單一格子 */
        .spot {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
            position: relative;
        }
        
        /* 起點與標誌樣式 */
        .car-start {
            background-color: #ffc107 !important;
            border: 3px solid #d39e00 !important;
            color: #856404;
            font-weight: bold;
            box-sizing: border-box;
        }
        .sign-red {
            background-color: #ff4d4d !important;
            border: 3px solid #cc0000 !important;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
        }
        .sign-green {
            background-color: #28a745 !important;
            border: 3px solid #1e7e34 !important;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>WRO 2024 未來工程師 場地抽籤系統</h1>
    
    <div class="controls">
        <label for="mode-select"><strong>賽事模式：</strong></label>
        <select id="mode-select" onchange="resetField()">
            <option value="track">資格賽 (賽道挑戰 - 僅抽牆壁與起點)</option>
            <option value="obstacle">決賽 (障礙避障 - 加入方塊抽籤)</option>
        </select>
        <button class="draw-btn" onclick="drawLots()">🎲 進行抽籤</button>
        <button class="reset-btn" onclick="resetField()">🔄 RESET 重置</button>
    </div>

    <div class="info-panel" id="result-info">
        <strong>等待抽籤中...</strong>
    </div>

    <div class="field-container" id="field">
        <div class="inner-wall" id="inner-wall">中央內牆區域</div>
        
        <div class="segment top" id="seg-0"></div>
        <div class="segment right" id="seg-1"></div>
        <div class="segment bottom" id="seg-2"></div>
        <div class="segment left" id="seg-3"></div>
    </div>

    <script>
        const segments = ['top', 'right', 'bottom', 'left'];
        const segmentNames = ['上方直線', '右側直線', '下方直線', '左側直線'];

        // 初始化場地格子 (1 到 6)
        function initGrid() {
            segments.forEach((seg, sIdx) => {
                const container = document.getElementById(`seg-${sIdx}`);
                container.innerHTML = '';
                for (let i = 1; i <= 6; i++) {
                    let spot = document.createElement('div');
                    spot.className = 'spot';
                    spot.id = `spot-${sIdx}-${i}`;
                    spot.innerText = i; // 顯示格數 1-6
                    container.appendChild(spot);
                }
            });
        }

        function resetField() {
            initGrid();
            document.getElementById('result-info').innerHTML = '<strong>等待抽籤中...</strong>';
            document.getElementById('inner-wall').innerHTML = '中央內牆區域';
        }

        function drawLots() {
            resetField();
            const mode = document.getElementById('mode-select').value;
            let resultHTML = "";

            // 1. 決定行駛方向
            const direction = Math.random() < 0.5 ? "順時針" : "逆時針";
            resultHTML += `🚗 <strong>行駛方向：</strong> ${direction}<br>`;

            // 2. 決定起始位置 (4個賽段選1, 1~6格選1)
            const startSegment = Math.floor(Math.random() * 4);
            const startSpot = Math.floor(Math.random() * 6) + 1;
            
            const startEl = document.getElementById(`spot-${startSegment}-${startSpot}`);
            startEl.classList.add('car-start');
            startEl.innerHTML = '🚗<br>起點';
            resultHTML += `📍 <strong>起始位置：</strong> ${segmentNames[startSegment]} 的第 ${startSpot} 格<br>`;

            // 3. 內圍牆設定 (無論資格或決賽，通常場地皆需抽出寬窄)
            const wallTypes = ['寬賽道 (預設)', '窄賽道 (偏移)'];
            let walls = [];
            for (let i = 0; i < 4; i++) {
                walls.push(Math.random() < 0.5 ? 0 : 1);
            }
            resultHTML += `🧱 <strong>內牆設定：</strong> 
                           上[${walls[0]===0?'寬':'窄'}] / 
                           右[${walls[1]===0?'寬':'窄'}] / 
                           下[${walls[2]===0?'寬':'窄'}] / 
                           左[${walls[3]===0?'寬':'窄'}]<br>`;
            
            document.getElementById('inner-wall').innerHTML = `
                內圍牆狀態<br><br>
                上：${walls[0]===0?'寬':'窄'} <br>
                左：${walls[3]===0?'寬':'窄'} &nbsp;&nbsp;&nbsp;&nbsp; 右：${walls[1]===0?'寬':'窄'} <br>
                下：${walls[2]===0?'寬':'窄'}
            `;

            // 4. 決賽模式：加入方塊 (交通標誌) 抽籤
            if (mode === 'obstacle') {
                resultHTML += `<hr>🚦 <strong>決賽方塊 (交通標誌) 位置：</strong><br>`;
                
                // 產生剛好 2綠 2紅 的陣列並洗牌 (修正先前數量隨機的錯誤)
                let signs = ['green', 'green', 'red', 'red'];
                for (let i = signs.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [signs[i], signs[j]] = [signs[j], signs[i]];
                }

                // 依序分配給 4 個直線賽段
                for (let i = 0; i < 4; i++) {
                    let signSpot;
                    // 隨機抽 1-6 格，若與起點重疊則重抽，直到不重疊為止
                    do {
                        signSpot = Math.floor(Math.random() * 6) + 1;
                    } while (i === startSegment && signSpot === startSpot);
                    
                    const spotEl = document.getElementById(`spot-${i}-${signSpot}`);
                    const signColor = signs[i];
                    
                    if (signColor === 'green') {
                        spotEl.classList.add('sign-green');
                        spotEl.innerHTML = '🟩<br>綠柱';
                        resultHTML += ` - ${segmentNames[i]}: 第 ${signSpot} 格 (🟢 綠色標誌 - 需靠左行駛)<br>`;
                    } else {
                        spotEl.classList.add('sign-red');
                        spotEl.innerHTML = '🟥<br>紅柱';
                        resultHTML += ` - ${segmentNames[i]}: 第 ${signSpot} 格 (🔴 紅色標誌 - 需靠右行駛)<br>`;
                    }
                }
            }

            document.getElementById('result-info').innerHTML = resultHTML;
        }

        window.onload = initGrid;
    </script>
</body>
</html>
