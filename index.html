<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2026 官方抽籤系統 (精準網格修正版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        h1 { color: #0056b3; font-size: 26px; text-align: center; margin-top: 20px;}
        
        /* ================= 左上角時鐘 ================= */
        #realtime-clock {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #0056b3;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border: 2px solid #0056b3;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        /* 模式切換頁籤 (Tabs) */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { font-size: 18px; padding: 12px 30px; border: 2px solid #0056b3; border-radius: 30px; background-color: #fff; color: #0056b3; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-btn:hover { background-color: #e9ecef; }
        .tab-btn.active { background-color: #0056b3; color: #fff; box-shadow: 0 4px 8px rgba(0,86,179,0.3); }

        /* 按鈕控制區 */
        .controls { text-align: center; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-group { display: flex; justify-content: center; gap: 15px; } 
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; font-size: 18px; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.draw-btn:hover { background-color: #218838; transform: scale(1.02); }
        
        button.reset-btn { background-color: #dc3545; color: white; font-weight: bold; font-size: 18px; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.reset-btn:hover { background-color: #c82333; transform: scale(1.02); }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .info-panel { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 25px; border-radius: 8px; line-height: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 5px solid #0056b3; font-size: 16px; }
        .section-title { font-weight: bold; color: #0056b3; margin-top: 5px; margin-bottom: 15px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        
        .map-panel { flex: 2; min-width: 500px; max-width: 800px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; }
        
        /* 賽道底板 */
        .map-container { position: relative; width: 100%; max-width: 700px; aspect-ratio: 1 / 1; background-color: #fff; overflow: hidden; border-radius: 8px; }
        
        /* 賽道標線 */
        .track-wall { position: absolute; box-sizing: border-box; }
        .outer-wall { top: 10%; bottom: 10%; left: 10%; right: 10%; border: 6px solid #fff; border-radius: 12%; background-color: #3b3b3b; box-shadow: 0 0 0 2px #ddd; z-index: 1; }
        .center-line { top: 18%; bottom: 18%; left: 18%; right: 18%; border: 3px dashed rgba(255, 255, 255, 0.45); border-radius: 7%; pointer-events: none; z-index: 2; }
        .inner-wall { top: 26%; bottom: 26%; left: 26%; right: 26%; border: 6px solid #fff; border-radius: 4%; background-color: #f0f2f5; box-shadow: inset 0 0 0 2px #ddd; z-index: 4; }

        .boundary-line { position: absolute; z-index: 3; }
        .line-v-blue { width: 6px; height: 16.5%; background-color: #0056b3; }
        .line-h-orange { height: 6px; width: 16.5%; background-color: #ff7b00; }
        
        /* ================= 視覺化元素 ================= */
        
        /* 中央行駛方向箭頭 */
        .direction-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: bold;
            color: rgba(217, 4, 41, 0.15);
            z-index: 5;
            pointer-events: none;
        }

        /* 決賽：柱子與停車場 */
        .overlay { position: absolute; transform: translate(-50%, -50%); width: 3.5%; aspect-ratio: 1 / 1; border-radius: 50%; box-shadow: 2px 2px 6px rgba(0,0,0,0.8); z-index: 10; border: 2.5px solid #fff; transition: all 0.4s ease;}
        .pillar-red { background-color: #d90429; }
        .pillar-green { background-color: #00a800; }
        .parking-zone { position: absolute; border: 3px dashed #F702F9; background-color: rgba(247, 2, 249, 0.25); z-index: 5; display: flex; align-items: center; justify-content: center; color: #F702F9; font-weight: bold; font-size: 20px; border-radius: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);}

        /* 資格賽：牆體遮擋、起點格與車輛 */
        .wall-block {
            position: absolute; z-index: 6; border: 2px solid #222; border-radius: 4px;
            background: repeating-linear-gradient(45deg, #ffc107, #ffc107 10px, #333 10px, #333 20px);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); opacity: 0.95;
            transform: translate(-50%, -50%);
        }
        
        /* 起點格 */
        .start-zone-marker {
            position: absolute; transform: translate(-50%, -50%); z-index: 5;
            border: 2px dashed #999; background-color: rgba(255, 255, 255, 0.8);
            width: 6.5%; aspect-ratio: 1 / 1; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: #666;
        }
        
        /* 被抽中的那格高亮 */
        .start-zone-active {
            border-color: #28a745; background-color: rgba(40, 167, 69, 0.3); color: #155724;
        }

        .start-car {
            position: absolute; transform: translate(-50%, -50%); z-index: 15;
            background-color: #ffc107; border: 2px solid #333; border-radius: 5px;
            width: 5.5%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body onload="init()">

    <div id="realtime-clock">讀取時間中...</div>

    <h1>WRO 2026 官方抽籤系統</h1>

    <div class="tab-container">
        <button id="tab-open" class="tab-btn active" onclick="switchMode('open')">🏁 Open Challenge (資格賽)</button>
        <button id="tab-obstacle" class="tab-btn" onclick="switchMode('obstacle')">🚧 Obstacle Challenge (決賽)</button>
    </div>
    
    <div class="controls">
        <div class="btn-group">
            <button class="draw-btn" id="main-draw-btn" onclick="runDraw()">🎲 執行資格賽抽籤</button>
            <button class="reset-btn" onclick="resetDraw()">🔄 重設畫面</button>
        </div>
        <div id="mode-hint" style="margin-top: 15px; font-size: 14px; color: #666;">
            資格賽模式：寬場地為 6 格 (1~6)，窄場地會遮擋第 1、2 格，剩下 4 格 (3、4、5、6)。
        </div>
    </div>

    <div class="main-container">
        <div class="info-panel" id="result-info">
            <strong>請點擊上方按鈕進行抽籤...</strong>
        </div>

        <div class="map-panel">
            <div class="map-container" id="map-container">
                <div class="track-wall outer-wall"></div>
                <div class="track-wall center-line"></div>
                
                <div class="boundary-line line-v-blue" style="top: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="top: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; bottom: 26%; transform: translateY(50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; bottom: 26%; transform: translateY(50%);"></div>

                <div class="track-wall inner-wall"></div>
                
                <div id="overlays-layer"></div>
            </div>
        </div>
    </div>

    <script>
        function init() {
            updateClock(); 
            setInterval(updateClock, 1000); 
            switchMode('open'); 
        }

        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timeString = `${year}年${month}月${day}日 ${hours}:${minutes}:${seconds}`;
            document.getElementById('realtime-clock').innerText = timeString;
        }

        let currentMode = 'open'; 

        function resetDraw() {
            document.getElementById('overlays-layer').innerHTML = ''; 
            document.getElementById('result-info').innerHTML = '<strong>請點擊上方按鈕進行抽籤...</strong>';
        }

        function switchMode(mode) {
            currentMode = mode;
            resetDraw(); 

            document.getElementById('tab-open').classList.remove('active');
            document.getElementById('tab-obstacle').classList.remove('active');
            document.getElementById(`tab-${mode}`).classList.add('active');

            const btn = document.getElementById('main-draw-btn');
            const hint = document.getElementById('mode-hint');

            if (mode === 'open') {
                btn.innerHTML = '🎲 執行資格賽 (Open) 抽籤';
                hint.innerHTML = '資格賽模式：寬場地為 6 格 (1~6)，窄場地會遮擋第 1、2 格，剩下 4 格 (3、4、5、6)。';
            } else {
                btn.innerHTML = '🎲 執行決賽 (Obstacle) 抽籤';
                hint.innerHTML = '決賽模式：包含單一標誌 (必定在中間)、雙柱配置 (必定在前後)，以及停車場。';
            }
        }

        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        const getSectionInfo = () => {
            const t1 = tossCoin(), t2 = tossCoin();
            if (t1==="Heads" && t2==="Heads") return { id: "Top", name: "上方區 (Top)" };
            if (t1==="Heads" && t2==="Tails") return { id: "Right", name: "右側區 (Right)" };
            if (t1==="Tails" && t2==="Heads") return { id: "Left", name: "左側區 (Left)" };
            return { id: "Bottom", name: "下方區 (Bottom)" };
        };

        const CARD_LAYOUTS = { 
            1: [["p2", "Green", "Inner"]], 2: [["p2", "Red", "Inner"]],
            3: [["p2", "Green", "Outer"]], 4: [["p2", "Red", "Outer"]],
            5: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]],
            6: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            7: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]],
            8: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            9: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]],
            10: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            11: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]],
            12: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            13: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]],
            14: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            15: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]],
            16: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            17: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]],
            18: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            19: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]],
            20: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]],
            21: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]],
            22: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            23: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]],
            24: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            25: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]],
            26: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            27: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]],
            28: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            29: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]],
            30: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            31: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]],
            32: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            33: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]],
            34: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            35: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]],
            36: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]]
        };

        // 決賽專用座標
        const OBSTACLE_COORDS = { 
            "Top": { "Outer": { "p1": [34, 14], "p2": [50, 14], "p3": [66, 14] }, "Inner": { "p1": [34, 22], "p2": [50, 22], "p3": [66, 22] } },
            "Right": { "Outer": { "p1": [86, 34], "p2": [86, 50], "p3": [86, 66] }, "Inner": { "p1": [78, 34], "p2": [78, 50], "p3": [78, 66] } },
            "Bottom": { "Outer": { "p1": [66, 86], "p2": [50, 86], "p3": [34, 86] }, "Inner": { "p1": [66, 78], "p2": [50, 78], "p3": [34, 78] } },
            "Left": { "Outer": { "p1": [14, 66], "p2": [14, 50], "p3": [14, 34] }, "Inner": { "p1": [22, 66], "p2": [22, 50], "p3": [22, 34] } }
        };

        // 🎯 全新精準修正：按照真實場地的 3x2 網格配置
        // 每區固定有 1~6 的專屬位置，窄場地時遮蔽 1 和 2，僅顯示 3、4、5、6。
        const OPEN_GRID_COORDS = {
            "Top": {
                1: [34, 14], 2: [34, 22],  // 第一排 (窄場地時會被牆壁擋住)
                3: [50, 14], 4: [50, 22],  // 第二排
                5: [66, 14], 6: [66, 22]   // 第三排
            },
            "Right": {
                1: [86, 34], 2: [78, 34],  // 第一排 (窄場地時會被牆壁擋住)
                3: [86, 50], 4: [78, 50],  
                5: [86, 66], 6: [78, 66]   
            },
            "Bottom": {
                1: [66, 86], 2: [66, 78],  // 第一排 (窄場地時會被牆壁擋住)
                3: [50, 86], 4: [50, 78],  
                5: [34, 86], 6: [34, 78]   
            },
            "Left": {
                1: [14, 66], 2: [22, 66],  // 第一排 (窄場地時會被牆壁擋住)
                3: [14, 50], 4: [22, 50],  
                5: [14, 34], 6: [22, 34]   
            }
        };

        // 繪製行駛方向箭頭
        function drawDirectionArrow(dirEng) {
            const arrowEl = document.createElement('div');
            arrowEl.className = 'direction-arrow';
            arrowEl.innerHTML = dirEng === "Clockwise" ? "↻" : "↺";
            document.getElementById('overlays-layer').appendChild(arrowEl);
        }

        function addPillar(secId, pos, color, row, hasParking) {
            const actualRow = hasParking ? "Inner" : row; 
            const xy = OBSTACLE_COORDS[secId][actualRow][pos];
            const el = document.createElement('div');
            el.className = `overlay ${color === "Red" ? 'pillar-red' : 'pillar-green'}`;
            el.style.left = `${xy[0]}%`;
            el.style.top = `${xy[1]}%`;
            document.getElementById('overlays-layer').appendChild(el);
        }

        function drawParking(secId) {
            const el = document.createElement('div');
            el.className = 'parking-zone'; el.innerHTML = "P";
            if(secId === "Top") { el.style.left='44%'; el.style.top='10%'; el.style.width='12%'; el.style.height='8%'; }
            if(secId === "Right") { el.style.left='82%'; el.style.top='44%'; el.style.width='8%'; el.style.height='12%'; }
            if(secId === "Bottom") { el.style.left='44%'; el.style.top='82%'; el.style.width='12%'; el.style.height='8%'; }
            if(secId === "Left") { el.style.left='10%'; el.style.top='44%'; el.style.width='8%'; el.style.height='12%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        // 🎯 修正：精準蓋在第 1 和 第 2 格的位置上
        function drawNarrowWall(secId) {
            const el = document.createElement('div');
            el.className = 'wall-block';
            if(secId === "Top") { el.style.left='34%'; el.style.top='18%'; el.style.width='12%'; el.style.height='14%'; }
            if(secId === "Right") { el.style.left='82%'; el.style.top='34%'; el.style.width='14%'; el.style.height='12%'; }
            if(secId === "Bottom") { el.style.left='66%'; el.style.top='82%'; el.style.width='12%'; el.style.height='14%'; }
            if(secId === "Left") { el.style.left='18%'; el.style.top='66%'; el.style.width='14%'; el.style.height='12%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        // 🎯 修正：根據場地寬窄動態過濾要畫的格子
        function drawStartGrid(secId, activeZone, isWide) {
            const validZones = isWide ? [1, 2, 3, 4, 5, 6] : [3, 4, 5, 6]; 
            
            validZones.forEach(zoneId => {
                const el = document.createElement('div');
                el.className = `start-zone-marker ${zoneId === activeZone ? 'start-zone-active' : ''}`;
                el.innerHTML = (zoneId === activeZone) ? '' : zoneId;
                
                const xy = OPEN_GRID_COORDS[secId][zoneId];
                el.style.left = `${xy[0]}%`;
                el.style.top = `${xy[1]}%`;
                
                document.getElementById('overlays-layer').appendChild(el);
            });
        }

        function drawStartCar(secId, zoneId) {
            const el = document.createElement('div');
            el.className = 'start-car'; el.innerHTML = "🚗";
            
            const xy = OPEN_GRID_COORDS[secId][zoneId];
            el.style.left = `${xy[0]}%`;
            el.style.top = `${xy[1]}%`;
            
            document.getElementById('overlays-layer').appendChild(el);
        }

        function runDraw() {
            resetDraw(); 
            let html = "";
            const dirEng = Math.random() < 0.5 ? "Clockwise" : "Counter-Clockwise";
            const dirChn = dirEng === "Clockwise" ? "順時針 (↻)" : "逆時針 (↺)";

            drawDirectionArrow(dirEng);

            if (currentMode === 'open') {
                html += `<div class="section-title">🏁 資格賽 (Open) 抽籤結果</div>`;
                html += `<strong>1. 行駛方向：</strong> <span style="color:#d90429; font-weight:bold; font-size: 1.1em;">${dirChn}</span><br>`;
                
                const s = getSectionInfo();
                html += `<strong>2. 起始賽段：</strong> <span style="color:#007bff; font-weight:bold;">${s.name}</span><br>`;

                html += `<br><strong>3. 賽道寬窄 (障礙牆設置)：</strong><br>`;
                const sections = ["Top", "Right", "Bottom", "Left"];
                const sectionNames = {"Top": "上方", "Right": "右側", "Bottom": "下方", "Left": "左側"};
                
                let startSectionIsWide = true; 

                sections.forEach(sec => {
                    const isWide = tossCoin() === "Heads";
                    if (sec === s.id) {
                        startSectionIsWide = isWide;
                    }
                    html += `&nbsp;&nbsp;➔ ${sectionNames[sec]}區：<strong>${isWide ? "<span style='color:#28a745'>寬 (無阻擋)</span>" : "<span style='color:#d90429'>窄 (遮擋 1、2)</span>"}</strong><br>`;
                    if (!isWide) drawNarrowWall(sec);
                });

                // 🎯 修正：限定抽籤池
                const validZones = startSectionIsWide ? [1, 2, 3, 4, 5, 6] : [3, 4, 5, 6];
                const randomIndex = Math.floor(Math.random() * validZones.length);
                const startZone = validZones[randomIndex];
                
                html += `<br><strong>4. 起點位置：</strong> 位於 <span style="color:#F702F9; font-weight:bold;">第 ${startZone} 格</span><br>`;
                
                drawStartGrid(s.id, startZone, startSectionIsWide);
                drawStartCar(s.id, startZone);

            } else {
                html += `<div class="section-title">🏁 決賽 (Obstacle) 抽籤結果</div>`;
                html += `<strong>1. 行駛方向：</strong> <span style="color:#d90429; font-weight:bold; font-size: 1.1em;">${dirChn}</span><br>`;

                const s = getSectionInfo();
                const config = { single_sign_section: s.id };
                html += `<strong>2. 單一標誌區：</strong> <span style="color:#007bff; font-weight:bold;">${s.name}</span><br>`;

                const singleCardNum = Math.floor(Math.random() * 4) + 1;
                config.single_sign_card = singleCardNum;
                const singleData = CARD_LAYOUTS[singleCardNum][0];
                const colorName = singleData[1] === "Green" ? "綠柱" : "紅柱";
                const colorHex = singleData[1] === "Green" ? "#00a800" : "#d90429";
                const laneName = singleData[2] === "Inner" ? "內側" : "外側";
                
                html += `<strong>3. 單一標誌配置：</strong> <span style='color:${colorHex}; font-weight:bold;'>${colorName} (${laneName} - 卡牌 #${singleCardNum})</span><br>`;

                html += `<br><strong>4. 其他區域卡牌分配 (雙柱)：</strong><br>`;
                
                let doubleDeck = Array.from({length: 32}, (_, i) => i + 5); 
                doubleDeck.sort(() => Math.random() - 0.5);

                const sections = ["Top", "Right", "Bottom", "Left"];
                const sectionNames = {"Top": "上方", "Right": "右側", "Bottom": "下方", "Left": "左側"};
                const other_sections = sections.filter(sec => sec !== config.single_sign_section);
                
                config.other_sections_layout = {};
                other_sections.forEach(sec => {
                    const card = doubleDeck.pop();
                    config.other_sections_layout[sec] = card;
                    html += `&nbsp;&nbsp;➔ ${sectionNames[sec]}區 獲得 <strong>卡牌 #${card} (雙柱)</strong><br>`;
                });

                const p = getSectionInfo();
                config.parking_section = p.id;
                html += `<br><strong>5. 停車場位置：</strong> <span style="color:#F702F9; font-weight:bold;">${p.name}</span><br>`;
                
                const all_layouts = { ...config.other_sections_layout };
                all_layouts[config.single_sign_section] = config.single_sign_card;

                for (const [sec, cardNum] of Object.entries(all_layouts)) {
                    const layout = CARD_LAYOUTS[cardNum];
                    const hasParking = (sec === config.parking_section);
                    layout.forEach(pillar => {
                        const [pos, color, row] = pillar;
                        addPillar(sec, pos, color, row, hasParking);
                    });
                }
                drawParking(config.parking_section);
            }

            document.getElementById('result-info').innerHTML = html;
        }
    </script>
</body>
</html>
