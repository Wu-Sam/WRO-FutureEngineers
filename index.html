<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2026 官方抽籤系統 (加牆無字放大版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        h1 { color: #0056b3; font-size: 26px; text-align: center; margin-top: 20px;}
        
        /* ================= 左上角時鐘 ================= */
        #realtime-clock {
            position: fixed; top: 15px; left: 15px; font-size: 16px; font-weight: bold;
            color: #0056b3; background-color: rgba(255, 255, 255, 0.9); padding: 8px 15px;
            border: 2px solid #0056b3; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); z-index: 1000;
        }

        /* 模式切換頁籤 */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { font-size: 18px; padding: 12px 30px; border: 2px solid #0056b3; border-radius: 30px; background-color: #fff; color: #0056b3; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-btn:hover { background-color: #e9ecef; }
        .tab-btn.active { background-color: #0056b3; color: #fff; box-shadow: 0 4px 8px rgba(0,86,179,0.3); }

        /* 按鈕控制區 */
        .controls { text-align: center; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-group { display: flex; justify-content: center; gap: 15px; } 
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; font-size: 18px; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.draw-btn:hover { background-color: #218838; transform: scale(1.02); }
        button.reset-btn { background-color: #dc3545; color: white; font-weight: bold; font-size: 18px; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.reset-btn:hover { background-color: #c82333; transform: scale(1.02); }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .info-panel { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 25px; border-radius: 8px; line-height: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 5px solid #0056b3; font-size: 16px; }
        .section-title { font-weight: bold; color: #0056b3; margin-top: 5px; margin-bottom: 15px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        
        .map-panel { flex: 2; min-width: 500px; max-width: 800px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; }
        
        /* 賽道底板 */
        .map-container { position: relative; width: 100%; max-width: 700px; aspect-ratio: 1 / 1; background-color: #fff; overflow: hidden; border-radius: 8px; }
        
        /* 賽道標線 */
        .track-wall { position: absolute; box-sizing: border-box; }
        .outer-wall { top: 10%; bottom: 10%; left: 10%; right: 10%; border: 6px solid #fff; border-radius: 12%; background-color: #3b3b3b; box-shadow: 0 0 0 2px #ddd; z-index: 1; }
        .center-line { top: 18%; bottom: 18%; left: 18%; right: 18%; border: 3px dashed rgba(255, 255, 255, 0.45); border-radius: 7%; pointer-events: none; z-index: 2; }
        .inner-wall { top: 26%; bottom: 26%; left: 26%; right: 26%; border: 6px solid #fff; border-radius: 4%; background-color: #f0f2f5; box-shadow: inset 0 0 0 2px #ddd; z-index: 3; }

        .boundary-line { position: absolute; z-index: 3; }
        .line-v-blue { width: 6px; height: 16.5%; background-color: #0056b3; }
        .line-h-orange { height: 6px; width: 16.5%; background-color: #ff7b00; }
        
        /* 中央行駛方向箭頭 */
        .direction-arrow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; font-weight: bold; color: rgba(217, 4, 41, 0.15); z-index: 5; pointer-events: none; }

        /* ================= 資格賽：加牆延伸與起點格 ================= */
        
        /* 窄場地：向外延伸的實體牆面，與內牆同色 */
        .narrow-wall-extension {
            position: absolute; z-index: 6;
            background-color: #f0f2f5; /* 與內牆同色 */
            box-shadow: 0 0 0 2px #ddd; /* 模擬相同的灰色邊框 */
        }
        
        /* 起點格 (放大) */
        .start-zone-marker {
            position: absolute; transform: translate(-50%, -50%); z-index: 4;
            border: 2px dashed #999; background-color: rgba(255, 255, 255, 0.8);
            width: 7%; aspect-ratio: 1 / 1; border-radius: 4px; /* 從 4.5% 放大到 7% */
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold; color: #666;
        }
        .start-zone-active { border-color: #28a745; background-color: rgba(40, 167, 69, 0.3); color: #155724; z-index: 5; }

        .start-car {
            position: absolute; transform: translate(-50%, -50%); z-index: 15;
            background-color: #ffc107; border: 2px solid #333; border-radius: 5px;
            width: 7%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; /* 與起點格等大 */
            font-size: 24px; box-shadow: 2px 2px 6px rgba(0,0,0,0.7); /* 車子圖示放大 */
        }

        /* 決賽：柱子與停車場 */
        .overlay { position: absolute; transform: translate(-50%, -50%); width: 3.5%; aspect-ratio: 1 / 1; border-radius: 50%; box-shadow: 2px 2px 6px rgba(0,0,0,0.8); z-index: 10; border: 2.5px solid #fff; transition: all 0.4s ease;}
        .pillar-red { background-color: #d90429; }
        .pillar-green { background-color: #00a800; }
        .parking-zone { position: absolute; border: 3px dashed #F702F9; background-color: rgba(247, 2, 249, 0.25); z-index: 5; display: flex; align-items: center; justify-content: center; color: #F702F9; font-weight: bold; font-size: 20px; border-radius: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);}
    </style>
</head>
<body onload="init()">

    <div id="realtime-clock">讀取時間中...</div>
    <h1>WRO 2026 官方抽籤系統</h1>

    <div class="tab-container">
        <button id="tab-open" class="tab-btn active" onclick="switchMode('open')">🏁 Open Challenge (資格賽)</button>
        <button id="tab-obstacle" class="tab-btn" onclick="switchMode('obstacle')">🚧 Obstacle Challenge (決賽)</button>
    </div>
    
    <div class="controls">
        <div class="btn-group">
            <button class="draw-btn" id="main-draw-btn" onclick="runDraw()">🎲 執行資格賽抽籤</button>
            <button class="reset-btn" onclick="resetDraw()">🔄 重設畫面</button>
        </div>
        <div id="mode-hint" style="margin-top: 15px; font-size: 14px; color: #666;">
            資格賽模式：寬場地為 6 格。窄場地時，內牆會向外延伸（加牆）吃掉 1、2 格，只剩 3、4、5、6 格。
        </div>
    </div>

    <div class="main-container">
        <div class="info-panel" id="result-info"><strong>請點擊上方按鈕進行抽籤...</strong></div>
        <div class="map-panel">
            <div class="map-container" id="map-container">
                <div class="track-wall outer-wall"></div>
                <div class="track-wall center-line"></div>
                
                <div class="boundary-line line-v-blue" style="top: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="top: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; bottom: 26%; transform: translateY(50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; bottom: 26%; transform: translateY(50%);"></div>

                <div class="track-wall inner-wall"></div>
                <div id="overlays-layer"></div>
            </div>
        </div>
    </div>

    <script>
        function init() { updateClock(); setInterval(updateClock, 1000); switchMode('open'); }

        function updateClock() {
            const now = new Date();
            const timeString = `${now.getFullYear()}年${String(now.getMonth() + 1).padStart(2, '0')}月${String(now.getDate()).padStart(2, '0')}日 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.getElementById('realtime-clock').innerText = timeString;
        }

        let currentMode = 'open'; 
        function resetDraw() {
            document.getElementById('overlays-layer').innerHTML = ''; 
            document.getElementById('result-info').innerHTML = '<strong>請點擊上方按鈕進行抽籤...</strong>';
        }

        function switchMode(mode) {
            currentMode = mode; resetDraw(); 
            document.getElementById('tab-open').classList.remove('active');
            document.getElementById('tab-obstacle').classList.remove('active');
            document.getElementById(`tab-${mode}`).classList.add('active');

            const btn = document.getElementById('main-draw-btn');
            const hint = document.getElementById('mode-hint');

            if (mode === 'open') {
                btn.innerHTML = '🎲 執行資格賽 (Open) 抽籤';
                hint.innerHTML = '資格賽模式：寬場地為 6 格。窄場地時，內牆會向外延伸（加牆）吃掉 1、2 格，只剩 3、4、5、6 格。';
            } else {
                btn.innerHTML = '🎲 執行決賽 (Obstacle) 抽籤';
                hint.innerHTML = '決賽模式：包含單一標誌 (必定在中間)、雙柱配置 (必定在前後)，以及停車場。';
            }
        }

        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        const getSectionInfo = () => {
            const t1 = tossCoin(), t2 = tossCoin();
            if (t1==="Heads" && t2==="Heads") return { id: "Top", name: "上方區 (Top)" };
            if (t1==="Heads" && t2==="Tails") return { id: "Right", name: "右側區 (Right)" };
            if (t1==="Tails" && t2==="Heads") return { id: "Left", name: "左側區 (Left)" };
            return { id: "Bottom", name: "下方區 (Bottom)" };
        };

        const CARD_LAYOUTS = { /* ... 保留原本卡牌設定 ... */
            1: [["p2", "Green", "Inner"]], 2: [["p2", "Red", "Inner"]], 3: [["p2", "Green", "Outer"]], 4: [["p2", "Red", "Outer"]],
            5: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]], 6: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            7: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]], 8: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            9: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 10: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            11: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 12: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            13: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]], 14: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            15: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]], 16: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            17: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 18: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            19: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 20: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]],
            21: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]], 22: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            23: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]], 24: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            25: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 26: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            27: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 28: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            29: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]], 30: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            31: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]], 32: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            33: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 34: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            35: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 36: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]]
        };

        const OPEN_GRID_COORDS = {
            "Top": {
                1: [34, 23], 2: [66, 23],
                3: [34, 18], 4: [66, 18],
                5: [34, 13], 6: [66, 13]
            },
            "Right": {
                1: [77, 34], 2: [77, 66],
                3: [82, 34], 4: [82, 66],
                5: [87, 34], 6: [87, 66]
            },
            "Bottom": {
                1: [66, 77], 2: [34, 77],
                3: [66, 82], 4: [34, 82],
                5: [66, 87], 6: [34, 87]
            },
            "Left": {
                1: [23, 34], 2: [23, 66],
                3: [18, 34], 4: [18, 66],
                5: [13, 34], 6: [13, 66]
            }
        };

        function drawDirectionArrow(dirEng) {
            const arrowEl = document.createElement('div');
            arrowEl.className = 'direction-arrow'; arrowEl.innerHTML = dirEng === "Clockwise" ? "↻" : "↺";
            document.getElementById('overlays-layer').appendChild(arrowEl);
        }

        function drawNarrowWallExtension(secId) {
            const el = document.createElement('div');
            el.className = 'narrow-wall-extension';
            // 拿掉 WALL 文字，改用原本內牆顏色和陰影邊框
            if(secId === "Top") { el.style.left='26%'; el.style.top='20%'; el.style.width='48%'; el.style.height='6%'; }
            if(secId === "Right") { el.style.left='74%'; el.style.top='26%'; el.style.width='6%'; el.style.height='48%'; }
            if(secId === "Bottom") { el.style.left='26%'; el.style.top='74%'; el.style.width='48%'; el.style.height='6%'; }
            if(secId === "Left") { el.style.left='20%'; el.style.top='26%'; el.style.width='6%'; el.style.height='48%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        function drawStartGrid(secId, activeZone, isWide) {
            const validZones = isWide ? [1, 2, 3, 4, 5, 6] : [3, 4, 5, 6]; 
            validZones.forEach(zoneId => {
                const el = document.createElement('div');
                el.className = `start-zone-marker ${zoneId === activeZone ? 'start-zone-active' : ''}`;
                el.innerHTML = (zoneId === activeZone) ? '' : zoneId;
                const xy = OPEN_GRID_COORDS[secId][zoneId];
                el.style.left = `${xy[0]}%`; el.style.top = `${xy[1]}%`;
                document.getElementById('overlays-layer').appendChild(el);
            });
        }

        function drawStartCar(secId, zoneId) {
            const el = document.createElement('div');
            el.className = 'start-car'; el.innerHTML = "🚗";
            const xy = OPEN_GRID_COORDS[secId][zoneId];
            el.style.left = `${xy[0]}%`; el.style.top = `${xy[1]}%`;
            document.getElementById('overlays-layer').appendChild(el);
        }

        function runDraw() {
            resetDraw(); 
            let html = "";
            const dirEng = Math.random() < 0.5 ? "Clockwise" : "Counter-Clockwise";
            const dirChn = dirEng === "Clockwise" ? "順時針 (↻)" : "逆時針 (↺)";
            drawDirectionArrow(dirEng);

            if (currentMode === 'open') {
                html += `<div class="section-title">🏁 資格賽 (Open) 抽籤結果</div>`;
                html += `<strong>1. 行駛方向：</strong> <span style="color:#d90429; font-weight:bold; font-size: 1.1em;">${dirChn}</span><br>`;
                const s = getSectionInfo();
                html += `<strong>2. 起始賽段：</strong> <span style="color:#007bff; font-weight:bold;">${s.name}</span><br>`;
                html += `<br><strong>3. 賽道寬窄 (內側加牆設置)：</strong><br>`;
                
                const sections = ["Top", "Right", "Bottom", "Left"];
                const sectionNames = {"Top": "上方", "Right": "右側", "Bottom": "下方", "Left": "左側"};
                let startSectionIsWide = true; 

                sections.forEach(sec => {
                    const isWide = tossCoin() === "Heads";
                    if (sec === s.id) startSectionIsWide = isWide;
                    html += `&nbsp;&nbsp;➔ ${sectionNames[sec]}區：<strong>${isWide ? "<span style='color:#28a745'>寬 (無阻擋)</span>" : "<span style='color:#d90429'>窄 (內牆向外推)</span>"}</strong><br>`;
                    if (!isWide) drawNarrowWallExtension(sec);
                });

                const validZones = startSectionIsWide ? [1, 2, 3, 4, 5, 6] : [3, 4, 5, 6];
                const randomIndex = Math.floor(Math.random() * validZones.length);
                const startZone = validZones[randomIndex];
                
                html += `<br><strong>4. 起點位置：</strong> 位於 <span style="color:#F702F9; font-weight:bold;">第 ${startZone} 格</span><br>`;
                
                drawStartGrid(s.id, startZone, startSectionIsWide);
                drawStartCar(s.id, startZone);

            } else {
                html += `<div class="section-title">🚧 決賽 (Obstacle) 開發中</div>`; 
            }
            document.getElementById('result-info').innerHTML = html;
        }
    </script>
</body>
</html>
