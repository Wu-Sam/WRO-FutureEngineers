<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2025 官方抽籤系統 (完美還原場地細節版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; color: #333; margin: 0; padding: 20px; }
        h1 { color: #0056b3; font-size: 26px; text-align: center; margin-top: 0;}
        .controls { text-align: center; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { font-size: 16px; padding: 12px 25px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; font-size: 18px; }
        button.draw-btn:hover { background-color: #218838; transform: scale(1.02); }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .info-panel { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 25px; border-radius: 8px; line-height: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 5px solid #0056b3; font-size: 16px; }
        .section-title { font-weight: bold; color: #0056b3; margin-top: 5px; margin-bottom: 15px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        
        .map-panel { flex: 2; min-width: 500px; max-width: 800px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; }
        
        /* 賽道底板 (含背景色用來模擬挖空的內圈) */
        .map-container { 
            position: relative; 
            width: 100%; 
            max-width: 700px; 
            aspect-ratio: 1 / 1; 
            background-color: #fff; 
            overflow: hidden;
            border-radius: 8px;
        }
        
        /* 賽道外牆、中心虛線、內牆 */
        .track-wall { position: absolute; box-sizing: border-box; }
        
        /* 外圈柏油路與白色粗邊界 */
        .outer-wall { 
            top: 10%; bottom: 10%; left: 10%; right: 10%; 
            border: 6px solid #fff; 
            border-radius: 8%; 
            background-color: #2b2d31; /* 深灰色路面 */
            box-shadow: 0 0 0 2px #ccc, inset 0 0 0 1px #555; 
            z-index: 1;
        }
        
        /* 中間分隔虛線 */
        .center-line { 
            top: 18%; bottom: 18%; left: 18%; right: 18%; 
            border: 3px dashed rgba(255, 255, 255, 0.4); 
            border-radius: 5.5%; 
            pointer-events: none; 
            z-index: 2;
        }

        /* 藍色與橘色區域劃分線 */
        .boundary-line { position: absolute; z-index: 3; }
        .line-v-blue { width: 5px; height: 16%; background-color: #0066ff; }
        .line-h-orange { height: 5px; width: 16%; background-color: #ff7b00; }

        /* 內圈非賽道區 (白色挖空 + 白色粗邊界) */
        .inner-wall { 
            top: 26%; bottom: 26%; left: 26%; right: 26%; 
            border: 6px solid #fff; 
            border-radius: 4%; 
            background-color: #e9ecef; /* 與網頁背景同色，視覺挖空 */
            box-shadow: inset 0 0 0 2px #ccc, 0 0 0 1px #555;
            z-index: 4;
        }

        /* 視覺化柱子元素 */
        .overlay { position: absolute; transform: translate(-50%, -50%); width: 3.5%; aspect-ratio: 1 / 1; border-radius: 50%; box-shadow: 2px 2px 6px rgba(0,0,0,0.8); z-index: 10; border: 2.5px solid #fff; transition: all 0.4s ease;}
        .pillar-red { background-color: #d90429; }
        .pillar-green { background-color: #00a800; }
        
        /* 停車場 */
        .parking-zone { position: absolute; border: 3px dashed #F702F9; background-color: rgba(247, 2, 249, 0.25); z-index: 5; display: flex; align-items: center; justify-content: center; color: #F702F9; font-weight: bold; font-size: 20px; border-radius: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}
    </style>
</head>
<body onload="runDraw()">

    <h1>WRO 2025 決賽抽籤系統 (場地細節還原版)</h1>
    
    <div class="controls">
        <button class="draw-btn" onclick="runDraw()">🎲 重新抽籤 (Generate New)</button>
        <div style="margin-top: 10px; font-size: 14px; color: #666;">完美還原 WRO 賽道白線與橘/藍區域分割線，100% 精準對齊！</div>
    </div>

    <div class="main-container">
        <div class="info-panel" id="result-info">
            <strong>正在執行抽籤...</strong>
        </div>

        <div class="map-panel">
            <div class="map-container" id="map-container">
                <div class="track-wall outer-wall"></div>
                <div class="track-wall center-line"></div>
                
                <div class="boundary-line line-v-blue" style="top: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="top: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; left: 26%; transform: translateX(-50%);"></div>
                <div class="boundary-line line-v-blue" style="bottom: 10%; right: 26%; transform: translateX(50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="left: 10%; bottom: 26%; transform: translateY(50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; top: 26%; transform: translateY(-50%);"></div>
                <div class="boundary-line line-h-orange" style="right: 10%; bottom: 26%; transform: translateY(50%);"></div>

                <div class="track-wall inner-wall"></div>
                
                <div id="overlays-layer"></div>
            </div>
        </div>
    </div>

    <script>
        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        
        const getSectionInfo = () => {
            const t1 = tossCoin(), t2 = tossCoin();
            if (t1==="Heads" && t2==="Heads") return { id: "Top", name: "上方區 (Top)" };
            if (t1==="Heads" && t2==="Tails") return { id: "Right", name: "右側區 (Right)" };
            if (t1==="Tails" && t2==="Heads") return { id: "Left", name: "左側區 (Left)" };
            return { id: "Bottom", name: "下方區 (Bottom)" };
        };

        const CARD_LAYOUTS = {
            1: [["p3", "Green", "Inner"]], 2: [["p3", "Red", "Inner"]],
            3: [["p2", "Green", "Inner"]], 4: [["p2", "Red", "Inner"]],
            5: [["p1", "Green", "Inner"]], 6: [["p1", "Red", "Inner"]],
            7: [["p3", "Green", "Outer"]], 8: [["p3", "Red", "Outer"]],
            9: [["p2", "Green", "Outer"]], 10: [["p2", "Red", "Outer"]],
            11: [["p1", "Green", "Inner"]], 12: [["p1", "Red", "Inner"]],
            13: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]], 14: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            15: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 16: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            17: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 18: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            19: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]], 20: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            21: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 22: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            23: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 24: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            25: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]], 26: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            27: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 28: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            29: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 30: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            31: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]], 32: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            33: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 34: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            35: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 36: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]]
        };

        const COORDS = {
            "Top": {
                "Outer": { "p1": [34, 14], "p2": [50, 14], "p3": [66, 14] },
                "Inner": { "p1": [34, 22], "p2": [50, 22], "p3": [66, 22] }
            },
            "Right": {
                "Outer": { "p1": [86, 34], "p2": [86, 50], "p3": [86, 66] },
                "Inner": { "p1": [78, 34], "p2": [78, 50], "p3": [78, 66] }
            },
            "Bottom": {
                "Outer": { "p1": [66, 86], "p2": [50, 86], "p3": [34, 86] },
                "Inner": { "p1": [66, 78], "p2": [50, 78], "p3": [34, 78] }
            },
            "Left": {
                "Outer": { "p1": [14, 66], "p2": [14, 50], "p3": [14, 34] },
                "Inner": { "p1": [22, 66], "p2": [22, 50], "p3": [22, 34] }
            }
        };

        function addPillar(secId, pos, color, row, hasParking) {
            const actualRow = hasParking ? "Inner" : row; 
            const xy = COORDS[secId][actualRow][pos];
            
            const el = document.createElement('div');
            el.className = `overlay ${color === "Red" ? 'pillar-red' : 'pillar-green'}`;
            el.style.left = `${xy[0]}%`;
            el.style.top = `${xy[1]}%`;
            document.getElementById('overlays-layer').appendChild(el);
        }

        function drawParking(secId) {
            const el = document.createElement('div');
            el.className = 'parking-zone';
            el.innerHTML = "P";
            if(secId === "Top") { el.style.left='44%'; el.style.top='18%'; el.style.width='12%'; el.style.height='8%'; }
            if(secId === "Right") { el.style.left='74%'; el.style.top='44%'; el.style.width='8%'; el.style.height='12%'; }
            if(secId === "Bottom") { el.style.left='44%'; el.style.top='74%'; el.style.width='12%'; el.style.height='8%'; }
            if(secId === "Left") { el.style.left='18%'; el.style.top='44%'; el.style.width='8%'; el.style.height='12%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        function runDraw() {
            document.getElementById('overlays-layer').innerHTML = '';
            
            let html = `<div class="section-title">🏁 Obstacle 決賽抽籤結果</div>`;
            const config = {};

            const dirEng = Math.random() < 0.5 ? "Clockwise" : "Counter-Clockwise";
            const dirChn = dirEng === "Clockwise" ? "順時針" : "逆時針";
            config.direction = dirEng;
            html += `<strong>1. 行駛方向：</strong> <span style="color:#d90429; font-weight:bold;">${dirChn}</span><br>`;

            const s = getSectionInfo();
            config.single_sign_section = s.id;
            html += `<strong>2. 單一標誌區：</strong> <span style="color:#007bff; font-weight:bold;">${s.name}</span><br>`;

            const colorToss = tossCoin();
            config.single_sign_card = colorToss === "Heads" ? 9 : 10;
            const colorChn = colorToss === "Heads" ? "<span style='color:#00a800;'>綠柱 (卡牌 #9)</span>" : "<span style='color:#d90429;'>紅柱 (卡牌 #10)</span>";
            html += `<strong>3. 單一標誌顏色：</strong> ${colorChn}<br>`;

            html += `<br><strong>4. 其他區域卡牌分配：</strong><br>`;
            let deck = Array.from({length: 36}, (_, i) => i + 1);
            deck = deck.filter(c => c !== config.single_sign_card);
            deck.sort(() => Math.random() - 0.5);

            const sections = ["Top", "Right", "Bottom", "Left"];
            const sectionNames = {"Top": "上方", "Right": "右側", "Bottom": "下方", "Left": "左側"};
            const other_sections = sections.filter(sec => sec !== config.single_sign_section);
            
            config.other_sections_layout = {};
            other_sections.forEach(sec => {
                const card = deck.pop();
                config.other_sections_layout[sec] = card;
                html += `&nbsp;&nbsp;➔ ${sectionNames[sec]}區 獲得 <strong>卡牌 #${card}</strong><br>`;
            });

            const p = getSectionInfo();
            config.parking_section = p.id;
            html += `<br><strong>5. 停車場位置：</strong> <span style="color:#F702F9; font-weight:bold;">${p.name}</span><br>`;
            
            const all_layouts = { ...config.other_sections_layout };
            all_layouts[config.single_sign_section] = config.single_sign_card;

            for (const [sec, cardNum] of Object.entries(all_layouts)) {
                const layout = CARD_LAYOUTS[cardNum];
                const hasParking = (sec === config.parking_section);
                
                layout.forEach(pillar => {
                    const [pos, color, row] = pillar;
                    addPillar(sec, pos, color, row, hasParking);
                });
            }
            drawParking(config.parking_section);

            document.getElementById('result-info').innerHTML = html;
        }
    </script>
</body>
</html>
