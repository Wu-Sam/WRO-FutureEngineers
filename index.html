<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2025 官方抽籤與場地視覺化 (完全版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        h1 { color: #0056b3; font-size: 24px; text-align: center; margin-top: 0;}
        .controls { text-align: center; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, button, input[type="file"] { font-size: 16px; padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        select, input[type="file"] { background-color: #e9ecef; border: 1px solid #ced4da; }
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; }
        button.draw-btn:hover { background-color: #218838; }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .info-panel { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 20px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 5px solid #0056b3; }
        .section-title { font-weight: bold; color: #0056b3; margin-top: 10px; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .highlight { color: #d90429; font-weight: bold; }
        
        .map-panel { flex: 2; min-width: 500px; max-width: 800px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; }
        .map-container { position: relative; width: 100%; max-width: 750px; margin-top: 15px; display: none; }
        .map-container img { width: 100%; height: auto; border-radius: 5px; display: block; border: 2px solid #ddd; box-sizing: border-box; }
        
        /* 視覺化元素 */
        .overlay { position: absolute; transform: translate(-50%, -50%); border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.7); z-index: 10; width: 2.5%; padding-bottom: 2.5%; border: 2px solid #fff; }
        .pillar-red { background-color: #d90429; }
        .pillar-green { background-color: #008000; }
        
        /* 停車場 */
        .parking-zone { position: absolute; border: 4px dashed #F702F9; background-color: rgba(247, 2, 249, 0.2); z-index: 5; display: flex; align-items: center; justify-content: center; color: #F702F9; font-weight: bold; font-size: 1.5vw;}
    </style>
</head>
<body>

    <h1>WRO 2025 Obstacle Challenge (依官方 Python 嚴格還原)</h1>
    
    <div class="controls">
        <button class="draw-btn" onclick="runDraw()">🎲 執行 Obstacle 抽籤</button>
        <span style="margin-left: 20px; font-weight:bold;">📁 載入場地圖：</span>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div class="main-container">
        <div class="info-panel" id="result-info">
            <strong>請先載入場地圖，然後點擊抽籤...</strong>
        </div>

        <div class="map-panel">
            <p id="map-hint" style="font-size: 14px; color: #888;">等待載入 WRO-2025_FutureEngineers_Playfield.jpg...</p>
            <div class="map-container" id="map-container">
                <img id="bg-image" src="" alt="場地圖">
                <div id="overlays-layer"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('bg-image').src = event.target.result;
                document.getElementById('map-container').style.display = 'block';
                document.getElementById('map-hint').style.display = 'none';
                runDraw();
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        const getSectionFromTosses = () => {
            const t1 = tossCoin(), t2 = tossCoin();
            if (t1==="Heads" && t2==="Heads") return { id: "Top", name: "Top (Heads & Heads)" };
            if (t1==="Heads" && t2==="Tails") return { id: "Right", name: "Right (Heads & Tails)" };
            if (t1==="Tails" && t2==="Heads") return { id: "Left", name: "Left (Tails & Heads)" };
            return { id: "Bottom", name: "Bottom (Tails & Tails)" };
        };

        // 嚴格遵循 Python 代碼裡的 CARD_LAYOUTS (包含其寫法設定)
        const CARD_LAYOUTS = {
            1: [["p3", "Green", "Inner"]], 2: [["p3", "Red", "Inner"]],
            3: [["p2", "Green", "Inner"]], 4: [["p2", "Red", "Inner"]],
            5: [["p1", "Green", "Inner"]], 6: [["p1", "Red", "Inner"]],
            7: [["p3", "Green", "Outer"]], 8: [["p3", "Red", "Outer"]],
            9: [["p2", "Green", "Outer"]], 10: [["p2", "Red", "Outer"]],
            11: [["p1", "Green", "Inner"]], 12: [["p1", "Red", "Inner"]],
            13: [["p3", "Green", "Outer"], ["p1", "Green", "Inner"]], 14: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            15: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 16: [["p3", "Green", "Outer"], ["p1", "Red", "Inner"]],
            17: [["p3", "Red", "Outer"], ["p1", "Green", "Inner"]], 18: [["p3", "Red", "Outer"], ["p1", "Red", "Inner"]],
            19: [["p3", "Green", "Inner"], ["p1", "Green", "Outer"]], 20: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            21: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 22: [["p3", "Green", "Inner"], ["p1", "Red", "Outer"]],
            23: [["p3", "Red", "Inner"], ["p1", "Green", "Outer"]], 24: [["p3", "Red", "Inner"], ["p1", "Red", "Outer"]],
            25: [["p3", "Green", "Inner"], ["p1", "Green", "Inner"]], 26: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            27: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 28: [["p3", "Green", "Inner"], ["p1", "Red", "Inner"]],
            29: [["p3", "Red", "Inner"], ["p1", "Green", "Inner"]], 30: [["p3", "Red", "Inner"], ["p1", "Red", "Inner"]],
            31: [["p3", "Green", "Outer"], ["p1", "Green", "Outer"]], 32: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            33: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 34: [["p3", "Green", "Outer"], ["p1", "Red", "Outer"]],
            35: [["p3", "Red", "Outer"], ["p1", "Green", "Outer"]], 36: [["p3", "Red", "Outer"], ["p1", "Red", "Outer"]]
        };

        // 將 2134x2134 圖片座標換算成百分比，實現完美貼合
        const COORDS = {
            "Top": {
                "Outer": { "p1": [33.2, 15.0], "p2": [48.0, 15.0], "p3": [63.0, 15.0] },
                "Inner": { "p1": [33.2, 21.1], "p2": [48.0, 21.1], "p3": [63.0, 21.1] }
            },
            "Right": {
                "Outer": { "p1": [80.8, 33.2], "p2": [80.8, 48.0], "p3": [80.8, 63.0] },
                "Inner": { "p1": [75.0, 33.2], "p2": [75.0, 48.0], "p3": [75.0, 63.0] }
            },
            "Bottom": {
                "Outer": { "p1": [63.0, 80.8], "p2": [48.0, 80.8], "p3": [33.2, 80.8] },
                "Inner": { "p1": [63.0, 75.0], "p2": [48.0, 75.0], "p3": [33.2, 75.0] }
            },
            "Left": {
                "Outer": { "p1": [15.0, 63.0], "p2": [15.0, 48.0], "p3": [15.0, 33.2] },
                "Inner": { "p1": [21.1, 63.0], "p2": [21.1, 48.0], "p3": [21.1, 33.2] }
            }
        };

        function addPillar(secId, pos, color, row, hasParking) {
            // 最關鍵規則：若此區有停車場，強制推向 Inner 內側
            const actualRow = hasParking ? "Inner" : row; 
            const xy = COORDS[secId][actualRow][pos];
            
            const el = document.createElement('div');
            el.className = `overlay ${color === "Red" ? 'pillar-red' : 'pillar-green'}`;
            el.style.left = `${xy[0]}%`;
            el.style.top = `${xy[1]}%`;
            document.getElementById('overlays-layer').appendChild(el);
        }

        function drawParking(secId) {
            const el = document.createElement('div');
            el.className = 'parking-zone';
            el.innerHTML = "P";
            // 依照 Python 座標推算停車場範圍百分比
            if(secId === "Top") { el.style.left='33.2%'; el.style.top='3.2%'; el.style.width='7.5%'; el.style.height='4.6%'; }
            if(secId === "Right") { el.style.left='87.8%'; el.style.top='33.2%'; el.style.width='4.6%'; el.style.height='7.5%'; }
            if(secId === "Bottom") { el.style.left='55.2%'; el.style.top='87.8%'; el.style.width='7.5%'; el.style.height='4.6%'; }
            if(secId === "Left") { el.style.left='3.2%'; el.style.top='55.2%'; el.style.width='4.6%'; el.style.height='7.5%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        function runDraw() {
            if(!document.getElementById('bg-image').src.includes("data:image")) return;
            document.getElementById('overlays-layer').innerHTML = '';
            
            let html = `<div class="section-title">--- Obstacle Challenge (決賽) ---</div>`;
            const config = {};

            // 1. 方向
            config.direction = Math.random() < 0.5 ? "Clockwise" : "Counter-Clockwise";
            html += `<strong>1. Driving Direction:</strong> ${config.direction}<br>`;

            // 2. 單一標誌區塊
            const s = getSectionFromTosses();
            config.single_sign_section = s.id;
            html += `<strong>2. Single Sign Section:</strong> ${s.name}<br>`;

            // 3. 單一標誌顏色 -> 直接決定卡牌是 9 或 10
            const colorToss = tossCoin();
            config.single_sign_card = colorToss === "Heads" ? 9 : 10;
            html += `<strong>3. Single Sign Color:</strong> ${colorToss} -> ${colorToss==="Heads"?"Green (Card #9)":"Red (Card #10)"}<br>`;

            // 4. 洗牌分配
            html += `<br><strong>4. Traffic Sign Layouts (Other Sections):</strong><br>`;
            let deck = Array.from({length: 36}, (_, i) => i + 1);
            deck = deck.filter(c => c !== config.single_sign_card); // 移除單一標誌卡牌
            deck.sort(() => Math.random() - 0.5); // Shuffle

            const sections = ["Top", "Right", "Bottom", "Left"];
            const other_sections = sections.filter(sec => sec !== config.single_sign_section);
            
            config.other_sections_layout = {};
            other_sections.forEach(sec => {
                const card = deck.pop();
                config.other_sections_layout[sec] = card;
                html += `&nbsp;&nbsp;➔ Section '${sec}' gets <strong>Card #${card}</strong><br>`;
            });

            // 5. 停車場
            const p = getSectionFromTosses();
            config.parking_section = p.id;
            html += `<br><strong>5. Parking Lot Section:</strong> ${p.name}<br>`;
            
            // 繪製結果
            const all_layouts = { ...config.other_sections_layout };
            all_layouts[config.single_sign_section] = config.single_sign_card;

            for (const [sec, cardNum] of Object.entries(all_layouts)) {
                const layout = CARD_LAYOUTS[cardNum];
                const hasParking = (sec === config.parking_section);
                
                layout.forEach(pillar => {
                    const [pos, color, row] = pillar; // ex: ["p3", "Green", "Inner"]
                    addPillar(sec, pos, color, row, hasParking);
                });
            }
            drawParking(config.parking_section);

            document.getElementById('result-info').innerHTML = html;
        }
    </script>
</body>
</html>
