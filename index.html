<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2025 官方抽籤與場地可視化系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        h1 { color: #0056b3; font-size: 24px; text-align: center; margin-top: 0;}
        .controls { text-align: center; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, button, input[type="file"] { font-size: 16px; padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        select, input[type="file"] { background-color: #e9ecef; border: 1px solid #ced4da; }
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; }
        button.draw-btn:hover { background-color: #218838; }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        /* 左側文字資訊區 */
        .info-panel { flex: 1; min-width: 320px; max-width: 400px; background: #fff; padding: 20px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 5px solid #0056b3; }
        .section-title { font-weight: bold; color: #0056b3; margin-top: 10px; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .highlight { color: #d90429; font-weight: bold; }
        .green-text { color: #008000; font-weight: bold; }
        .blue-text { color: #0056b3; font-weight: bold; }

        /* 右側場地圖視覺區 */
        .map-panel { flex: 2; min-width: 500px; max-width: 800px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; }
        
        .map-container { position: relative; width: 100%; max-width: 750px; margin-top: 15px; display: none; }
        .map-container img { width: 100%; height: auto; border-radius: 5px; display: block; border: 2px solid #ddd; box-sizing: border-box; }
        
        /* 視覺化疊加元素 */
        .overlay { position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; color: white; z-index: 10; }
        
        /* 柱子 (Pillars) */
        .pillar-red { width: 20px; height: 20px; background-color: #d90429; border: 2px solid #fff; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .pillar-green { width: 20px; height: 20px; background-color: #008000; border: 2px solid #fff; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        /* 停車區域 (Parking Lot) */
        .parking-zone { position: absolute; background-color: rgba(247, 2, 249, 0.4); border: 2px dashed #F702F9; z-index: 5; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; text-shadow: 1px 1px 2px white; }
        
        /* 寬窄牆體 (Walls) */
        .wall { position: absolute; background-color: rgba(100, 100, 100, 0.7); border: 1px solid #333; z-index: 4; }
        
        /* 起點標記 */
        .start-car { width: 30px; height: 30px; background-color: #ffc107; border: 2px solid #333; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-size: 16px; }
    </style>
</head>
<body>

    <h1>WRO 2025 未來工程師 官方抽籤與場地視覺化</h1>
    
    <div class="controls">
        <label for="mode-select"><strong>選擇賽事：</strong></label>
        <select id="mode-select" onchange="runDraw()">
            <option value="open">Open Challenge (資格賽 - 牆寬與起點)</option>
            <option value="obstacle">Obstacle Challenge (決賽 - 標誌柱與停車)</option>
        </select>
        <button class="draw-btn" onclick="runDraw()">🎲 執行抽籤</button>
        <span style="margin-left: 20px; font-weight:bold; color:#333;">📁 載入場地圖：</span>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div class="main-container">
        <div class="info-panel" id="result-info">
            <strong>請先載入場地圖，然後點擊抽籤...</strong>
        </div>

        <div class="map-panel">
            <p id="map-hint" style="font-size: 14px; color: #888;">等待載入 WRO-2025_FutureEngineers_Playfield.jpg...</p>
            <div class="map-container" id="map-container">
                <img id="bg-image" src="" alt="WRO 2025 場地圖">
                <div id="overlays-layer"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 處理圖片上傳 ---
        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('bg-image').src = event.target.result;
                document.getElementById('map-container').style.display = 'block';
                document.getElementById('map-hint').style.display = 'none';
                runDraw(); // 載入圖片後自動抽一次
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // 賽段中心基準座標 (百分比 %) - 基於正方形賽道
        const sectionCoords = {
            "Top": { x: 50, y: 15 },
            "Bottom": { x: 50, y: 85 },
            "Left": { x: 15, y: 50 },
            "Right": { x: 85, y: 50 }
        };

        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        const rollDice = () => Math.floor(Math.random() * 6) + 1;

        function getSectionFromTosses() {
            const t1 = tossCoin(), t2 = tossCoin();
            if (t1==="Heads" && t2==="Heads") return { id: "Top", name: "上方 (Top)" };
            if (t1==="Heads" && t2==="Tails") return { id: "Right", name: "右側 (Right)" };
            if (t1==="Tails" && t2==="Heads") return { id: "Left", name: "左側 (Left)" };
            return { id: "Bottom", name: "下方 (Bottom)" };
        }

        // 清除舊的疊加層
        function clearOverlays() {
            document.getElementById('overlays-layer').innerHTML = '';
        }

        // 新增疊加元素 (柱子/車)
        function addElement(type, secId, offsetPos, label = "") {
            const base = sectionCoords[secId];
            const el = document.createElement('div');
            el.className = `overlay ${type}`;
            el.innerHTML = label;
            
            // 根據位置微調 (模擬賽段內的刻度 1-6)
            let offsetX = 0, offsetY = 0;
            const spread = 20; // 分散範圍百分比
            const mappedOffset = ((offsetPos - 3.5) / 3) * spread; // 將 1~6 映射到 -20% ~ +20%

            if(secId === "Top" || secId === "Bottom") offsetX = mappedOffset;
            if(secId === "Left" || secId === "Right") offsetY = mappedOffset;

            el.style.left = `${base.x + offsetX}%`;
            el.style.top = `${base.y + offsetY}%`;
            document.getElementById('overlays-layer').appendChild(el);
        }

        // 繪製停車場
        function addParking(secId) {
            const el = document.createElement('div');
            el.className = 'parking-zone';
            el.innerHTML = "P";
            // 決定長寬與位置
            if(secId === "Top" || secId === "Bottom") {
                el.style.width = '15%'; el.style.height = '10%';
                el.style.left = '42.5%'; el.style.top = secId === "Top" ? '10%' : '80%';
            } else {
                el.style.width = '10%'; el.style.height = '15%';
                el.style.left = secId === "Left" ? '10%' : '80%'; el.style.top = '42.5%';
            }
            document.getElementById('overlays-layer').appendChild(el);
        }

        // 繪製牆壁 (資格賽專用)
        function addWall(secId, isWide) {
            if(isWide) return; // 寬走廊不畫額外牆，窄走廊才畫灰色阻擋區塊
            const el = document.createElement('div');
            el.className = 'wall';
            if(secId === "Top") { el.style.width = '40%'; el.style.height = '4%'; el.style.left='30%'; el.style.top='19%'; }
            if(secId === "Bottom") { el.style.width = '40%'; el.style.height = '4%'; el.style.left='30%'; el.style.top='77%'; }
            if(secId === "Left") { el.style.width = '4%'; el.style.height = '40%'; el.style.left='19%'; el.style.top='30%'; }
            if(secId === "Right") { el.style.width = '4%'; el.style.height = '40%'; el.style.left='77%'; el.style.top='30%'; }
            document.getElementById('overlays-layer').appendChild(el);
        }

        function runDraw() {
            if(!document.getElementById('bg-image').src.includes("data:image")) {
                document.getElementById('result-info').innerHTML = "<strong style='color:red;'>⚠️ 請先從右側上方按鈕「載入場地圖」！</strong>";
                return;
            }

            clearOverlays();
            const mode = document.getElementById('mode-select').value;
            const output = document.getElementById('result-info');
            let html = "";

            if (mode === "open") {
                // 資格賽
                html += `<div class="section-title">Open Challenge (資格賽) 抽籤結果</div>`;
                const dir = Math.random() < 0.5 ? "順時針" : "逆時針";
                html += `<strong>1. 行駛方向：</strong> <span class="blue-text">${dir}</span><br><br>`;

                const startSec = getSectionFromTosses();
                html += `<strong>2. 起始賽段：</strong> <span class="highlight">${startSec.name}</span><br><br>`;

                let widths = [], isWideArr = [];
                const sectionsOrder = ["Top", "Right", "Bottom", "Left"]; // 預設依序
                html += `<strong>3. 內圍牆設定 (深色半透明區塊代表窄賽道)：</strong><br>`;
                for(let i=0; i<4; i++) {
                    const isWide = tossCoin() === "Heads";
                    isWideArr.push(isWide);
                    html += `&nbsp;&nbsp;➔ ${sectionsOrder[i]}：<strong>${isWide ? "寬 (Wide)" : "窄 (Narrow)"}</strong><br>`;
                    addWall(sectionsOrder[i], isWide); // 畫牆
                }

                const startZone = rollDice();
                html += `<br><strong>4. 起點位置：</strong> 刻度 <span class="highlight">${startZone}</span><br>`;
                addElement('start-car', startSec.id, startZone, "🚗"); // 放車子

            } else {
                // 決賽
                html += `<div class="section-title">Obstacle Challenge (決賽) 抽籤結果</div>`;
                
                // 單一柱子
                const singleSec = getSectionFromTosses();
                const isRed = tossCoin() === "Heads";
                const signPos = rollDice();
                
                html += `<strong>1. 單一標誌區：</strong> <span class="highlight">${singleSec.name}</span><br>`;
                html += `<strong>2. 顏色與位置：</strong> ${isRed ? "🟥 紅" : "🟩 綠"} / 位置 ${signPos}<br><br>`;
                
                addElement(isRed ? 'pillar-red' : 'pillar-green', singleSec.id, signPos);

                // 其他三區 (模擬 36 卡牌)
                html += `<strong>3. 其餘賽段柱子 (模擬卡牌)：</strong><br>`;
                const sections = ["Top", "Right", "Bottom", "Left"];
                const otherSecs = sections.filter(s => s !== singleSec.id);
                
                otherSecs.forEach(sec => {
                    const cardNum = Math.floor(Math.random() * 36) + 1;
                    html += `&nbsp;&nbsp;➔ ${sec}：抽到卡牌 <strong>#${cardNum}</strong><br>`;
                    // 為了視覺化，模擬這張卡片產生 2 個隨機柱子
                    addElement(Math.random()<0.5 ? 'pillar-red' : 'pillar-green', sec, rollDice());
                    addElement(Math.random()<0.5 ? 'pillar-red' : 'pillar-green', sec, rollDice());
                });

                // 停車場
                const parkSec = getSectionFromTosses();
                const parkDir = tossCoin() === "Heads" ? "前進" : "倒車";
                html += `<br><strong>4. 停車區域：</strong> <span class="blue-text">${parkSec.name}</span><br>`;
                html += `<strong>5. 停車方向：</strong> 須以 <span class="blue-text">${parkDir}</span> 停入<br>`;
                
                addParking(parkSec.id);
                // 放一台車在停車場代表目標方向
                addElement('start-car', parkSec.id, 3.5, parkDir==="前進" ? "⬆️" : "⬇️");
            }
            output.innerHTML = html;
        }
    </script>
</body>
</html>
