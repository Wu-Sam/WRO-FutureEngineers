<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRO 2025 未來工程師 抽籤系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #0056b3; font-size: 24px; }
        .controls {
            margin: 10px 0; padding: 15px; background: #fff;
            border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }
        select, button {
            font-size: 16px; padding: 10px 20px; margin: 5px;
            border: none; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        select { background-color: #e9ecef; border: 1px solid #ced4da; }
        button.draw-btn { background-color: #28a745; color: white; font-weight: bold; }
        button.draw-btn:hover { background-color: #218838; }
        
        .info-panel {
            margin: 20px auto; max-width: 700px; background: #fff;
            padding: 20px; border-radius: 8px; text-align: left;
            line-height: 1.8; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            font-size: 16px; border-left: 5px solid #0056b3;
        }
        .section-title {
            font-weight: bold; color: #0056b3; margin-top: 10px; font-size: 18px;
        }
        .highlight { color: #d90429; font-weight: bold; }
        .green-text { color: #008000; font-weight: bold; }
    </style>
</head>
<body>

    <h1>WRO 2025 未來工程師 (自動駕駛) 官方抽籤系統</h1>
    
    <div class="controls">
        <label for="mode-select"><strong>賽事模式：</strong></label>
        <select id="mode-select">
            <option value="open">Open Challenge (資格賽)</option>
            <option value="obstacle">Obstacle Challenge (決賽 - 障礙與停車)</option>
        </select>
        <button class="draw-btn" onclick="runDraw()">🎲 執行 2025 規則抽籤</button>
    </div>

    <div class="info-panel" id="result-info">
        <strong>請點擊上方按鈕進行抽籤...</strong><br>
        <span style="font-size: 14px; color: #666;">* 本系統完全還原你上傳的 2025 Python 腳本邏輯 (包含 36 張卡牌演算與停車場判定)。</span>
    </div>

    <script>
        // 模擬硬幣與骰子
        const tossCoin = () => Math.random() < 0.5 ? "Heads" : "Tails";
        const rollDice = () => Math.floor(Math.random() * 6) + 1;

        // 根據兩次硬幣決定賽段
        function getSectionFromTosses() {
            const t1 = tossCoin();
            const t2 = tossCoin();
            if (t1 === "Heads" && t2 === "Heads") return { id: "Top", name: "上方 (Heads & Heads)", tosses: [t1, t2] };
            if (t1 === "Heads" && t2 === "Tails") return { id: "Right", name: "右側 (Heads & Tails)", tosses: [t1, t2] };
            if (t1 === "Tails" && t2 === "Heads") return { id: "Left", name: "左側 (Tails & Heads)", tosses: [t1, t2] };
            return { id: "Bottom", name: "下方 (Tails & Tails)", tosses: [t1, t2] };
        }

        function runDraw() {
            const mode = document.getElementById('mode-select').value;
            const output = document.getElementById('result-info');
            let html = "";

            if (mode === "open") {
                // --- 2025 Open Challenge (資格賽) 邏輯 ---
                html += `<div class="section-title">--- WRO 2025: Open Challenge (資格賽) ---</div>`;
                
                // 1. 行駛方向
                const direction = Math.random() < 0.5 ? "順時針 (Clockwise)" : "逆時針 (Counter-Clockwise)";
                html += `<strong>1. 行駛方向：</strong> ${direction}<br>`;

                // 2. 起始賽段
                const startSec = getSectionFromTosses();
                html += `<strong>2. 起始賽段 (擲硬幣)：</strong> ${startSec.tosses[0]}, ${startSec.tosses[1]}<br>`;
                html += `&nbsp;&nbsp;➔ 結果：起點位於 <strong>${startSec.name}</strong><br>`;

                // 3. 走廊寬度 (4個賽段)
                let widths = [], wTosses = [];
                for(let i=0; i<4; i++) {
                    let toss = tossCoin();
                    wTosses.push(toss);
                    widths.push(toss === "Heads" ? "寬 (Wide)" : "窄 (Narrow)");
                }
                html += `<strong>3. 走廊寬度設定 (由起點順時針排序)：</strong><br>`;
                html += `&nbsp;&nbsp;擲硬幣結果：${wTosses.join(', ')}<br>`;
                html += `&nbsp;&nbsp;- 起點賽段：${widths[0]}<br>`;
                html += `&nbsp;&nbsp;- 下一個順時針賽段：${widths[1]}<br>`;
                html += `&nbsp;&nbsp;- 對向賽段：${widths[2]}<br>`;
                html += `&nbsp;&nbsp;- 最後一個賽段：${widths[3]}<br>`;

                // 4. 起始區域 (1-6)
                const startZone = rollDice();
                html += `<strong>4. 確切起始位置 (擲骰子)：</strong> 骰出 <span class="highlight">${startZone}</span><br>`;
                html += `&nbsp;&nbsp;➔ 機器人將從位置 ${startZone} 開始。<br>`;

            } else {
                // --- 2025 Obstacle Challenge (決賽) 邏輯 ---
                html += `<div class="section-title">--- WRO 2025: Obstacle Challenge (決賽) ---</div>`;
                
                // 1. 單一交通標誌賽段
                const singleSec = getSectionFromTosses();
                html += `<strong>1. 單一標誌賽段 (擲硬幣)：</strong> ${singleSec.tosses[0]}, ${singleSec.tosses[1]}<br>`;
                html += `&nbsp;&nbsp;➔ 單一標誌位於：<strong>${singleSec.name}</strong><br>`;

                // 2 & 3. 顏色與位置
                const colorToss = tossCoin();
                const signColor = colorToss === "Heads" ? "<span class='highlight'>紅色 (Red)</span>" : "<span class='green-text'>綠色 (Green)</span>";
                const signPos = rollDice();
                html += `<strong>2. 標誌顏色 (擲硬幣)：</strong> ${colorToss} ➔ ${signColor}<br>`;
                html += `<strong>3. 標誌位置 (擲骰子)：</strong> 骰出位置 <span class="highlight">${signPos}</span><br>`;

                // 4. 其他三個賽段的卡牌抽籤 (1-36卡牌系統)
                html += `<strong>4. 其他賽段標誌佈置 (卡牌抽籤)：</strong><br>`;
                
                // 模擬 36 張牌，隨機抽掉一張做為單一標誌的代表卡
                let cards = Array.from({length: 36}, (_, i) => i + 1);
                const removedCard = cards.splice(Math.floor(Math.random() * cards.length), 1)[0];
                html += `&nbsp;&nbsp;<em>- 卡牌 #${removedCard} 已作為單一標誌佈置移除。</em><br>`;
                
                // 洗牌
                cards.sort(() => Math.random() - 0.5);
                const sections = ["Top", "Right", "Bottom", "Left"];
                const otherSections = sections.filter(s => s !== singleSec.id);
                
                html += `&nbsp;&nbsp;➔ 賽段 '${otherSections[0]}' 抽到 卡牌 #<strong>${cards.pop()}</strong><br>`;
                html += `&nbsp;&nbsp;➔ 賽段 '${otherSections[1]}' 抽到 卡牌 #<strong>${cards.pop()}</strong><br>`;
                html += `&nbsp;&nbsp;➔ 賽段 '${otherSections[2]}' 抽到 卡牌 #<strong>${cards.pop()}</strong><br>`;

                // 5. 停車場 / 起始賽段
                const parkingSec = getSectionFromTosses();
                html += `<strong>5. 停車場/起始賽段 (擲硬幣)：</strong> ${parkingSec.tosses[0]}, ${parkingSec.tosses[1]}<br>`;
                html += `&nbsp;&nbsp;➔ 停車區域位於：<strong>${parkingSec.name}</strong><br>`;

                // 6. 停車方向
                const dirToss = tossCoin();
                const parkDir = dirToss === "Heads" ? "前進 (Forward)" : "倒車 (Reverse)";
                html += `<strong>6. 停車方向 (擲硬幣)：</strong> ${dirToss} ➔ 車輛須以 <strong>${parkDir}</strong> 停入車庫。<br>`;
            }

            output.innerHTML = html;
        }
    </script>
</body>
</html>
